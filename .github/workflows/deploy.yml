name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy Application
        run: |
          # Navigate to project directory
          cd ~/HR
          
          # Fetch and force reset to match origin/main
          git fetch origin main
          git reset --hard origin/main
          
          # Rebuild and restart containers (no-cache to force Vite 6 downgrade)
          docker compose down
          docker compose up --build --no-cache -d
