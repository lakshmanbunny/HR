name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy Application
        run: |
          # Navigate to project directory
          cd ~/HR
          
          # Pull latest code
          git pull origin main
          
          # Rebuild and restart containers
          docker compose down
          docker compose up --build -d
