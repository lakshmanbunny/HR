services:
  # Backend FastAPI service
  - type: web
    name: ai-recruit-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: true
      - key: LANGCHAIN_PROJECT
        value: recruitment-poc

  # Frontend React (Vite) Static Site
  - type: static
    name: ai-recruit-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://ai-recruit-backend.onrender.com/api
