services:
  # Backend FastAPI service
  - type: web
    name: ai-recruit-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Set in Render Dashboard
      - key: GOOGLE_API_KEY
        sync: false # Set in Render Dashboard
      - key: GITHUB_TOKEN
        sync: false # Set in Render Dashboard
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: true
      - key: LANGCHAIN_PROJECT
        value: recruitment-poc

  # Frontend React (Vite) static site
  - type: web
    name: ai-recruit-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-recruit-backend.onrender.com/api # Replace with your actual backend URL after first deploy
