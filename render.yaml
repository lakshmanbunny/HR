services:
  # Backend FastAPI service
  - type: web
    name: ai-recruit-backend
    env: python
    plan: free # Explicitly set to free tier
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false

  # Frontend React (Vite) Static Site
  - type: web
    runtime: static
    name: ai-recruit-frontend
    # Static sites on Render are free by default, but let's be safe
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-recruit-backend.onrender.com/api
