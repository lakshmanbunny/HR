services:
  # Backend FastAPI service
  - type: web
    name: ai-recruit-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false

  # Frontend React (Vite) Static Site
  - type: web
    name: ai-recruit-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://ai-recruit-backend.onrender.com/api
